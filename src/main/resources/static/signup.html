<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>ChatOnline - Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --secondary: #10b981;
      --success: #22c55e;
      --danger: #ef4444;
      --dark: #1e293b;
      --light: #f8fafc;
    }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }
    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(16, 185, 129, 0.15);
      animation: float 20s linear infinite;
      bottom: -150px;
      border-radius: 50%;
    }
    .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 1s; animation-duration: 15s; }
    .bg-animation span:nth-child(3) { left: 70%; width: 30px; height: 30px; animation-delay: 2s; }
    .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0.5s; animation-duration: 18s; }
    .bg-animation span:nth-child(5) { left: 65%; width: 25px; height: 25px; animation-delay: 0s; }
    .bg-animation span:nth-child(6) { left: 75%; width: 90px; height: 90px; animation-delay: 3s; }
    .bg-animation span:nth-child(7) { left: 35%; width: 120px; height: 120px; animation-delay: 5s; }
    .bg-animation span:nth-child(8) { left: 55%; width: 35px; height: 35px; animation-delay: 8s; }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
    }
    /* Container */
    .container {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  0 0 100px rgba(16, 185, 129, 0.15);
      overflow: hidden;
      width: 100%;
      max-width: 1000px;
      display: flex;
      min-height: 650px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.8s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Left Panel */
    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      animation: pulse-glow 4s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.3; }
    }
    .left-content { position: relative; z-index: 1; text-align: center; }
    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float-icon 3s ease-in-out infinite;
      backdrop-filter: blur(10px);
    }
    .icon-wrapper i { font-size: 50px; }
    @keyframes float-icon {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-5deg); }
    }
    .left-content h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 15px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .left-content p {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.6;
    }
    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 40px;
    }
    .stat-box {
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 12px;
      animation: fadeInUp 0.5s ease-out backwards;
    }
    .stat-box:nth-child(1) { animation-delay: 0.2s; }
    .stat-box:nth-child(2) { animation-delay: 0.4s; }
    .stat-box:nth-child(3) { animation-delay: 0.6s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stat-box h3 { font-size: 28px; font-weight: 700; }
    .stat-box p { font-size: 12px; opacity: 0.8; }
    /* Right Panel */
    .right-panel {
      flex: 1;
      padding: 50px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
    }
    .form-header { margin-bottom: 30px; }
    .form-header h2 {
      font-size: 32px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }
    .form-header p { color: #64748b; font-size: 14px; }
    /* Form */
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper input {
      width: 100%;
      padding: 16px 50px 16px 50px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: inherit;
      background: #fafafa;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
      transform: translateY(-2px);
    }
    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 18px;
      transition: all 0.3s;
    }
    .input-wrapper input:focus + i { color: var(--primary); }
    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #9ca3af;
      transition: all 0.3s;
    }
    .toggle-password:hover { color: var(--primary); }
    /* Strength Indicator */
    .password-strength {
      margin-top: 8px;
      display: flex;
      gap: 5px;
    }
    .strength-bar {
      flex: 1;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      transition: all 0.3s;
    }
    .strength-bar.active.weak { background: var(--danger); }
    .strength-bar.active.medium { background: var(--primary); }
    .strength-bar.active.strong { background: var(--success); }
    .strength-text { font-size: 12px; margin-top: 5px; }
    .strength-text.weak { color: var(--danger); }
    .strength-text.medium { color: var(--primary); }
    .strength-text.strong { color: var(--success); }
    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .checkbox-group label {
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
    }
    .checkbox-group a { color: var(--primary); text-decoration: none; }
    /* Button */
    .btn-signup {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .btn-signup::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }
    .btn-signup:hover::before { left: 100%; }
    .btn-signup:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(245, 158, 11, 0.4);
    }
    .btn-signup:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .loading { display: none; }
    .loading .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Alert */
    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 12px;
      animation: shake 0.5s ease-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .alert.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .alert i { font-size: 20px; }
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #9ca3af;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
    }
    .divider span { padding: 0 20px; }
    /* Signin Link */
    .signin-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #64748b;
    }
    .signin-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      position: relative;
    }
    .signin-link a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }
    .signin-link a:hover::after { width: 100%; }
    /* Responsive */
    @media(max-width: 768px) {
      .container { flex-direction: column; max-width: 450px; }
      .left-panel { padding: 40px 30px; min-height: auto; }
      .icon-wrapper { width: 80px; height: 80px; }
      .icon-wrapper i { font-size: 35px; }
      .left-content h1 { font-size: 24px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-box { padding: 10px; }
      .stat-box h3 { font-size: 20px; }
      .right-panel { padding: 40px 30px; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="container">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="left-content">
        <div class="icon-wrapper">
          <i class="fas fa-user-plus"></i>
        </div>
        <h1>Join ChatOnline</h1>
        <p>Create your account and start connecting with amazing people around the world.</p>
        
        <div class="stats-grid">
          <div class="stat-box">
            <h3>10K+</h3>
            <p>Active Users</p>
          </div>
          <div class="stat-box">
            <h3>50K+</h3>
            <p>Matches Made</p>
          </div>
          <div class="stat-box">
            <h3>100%</h3>
            <p>Free</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="form-header">
        <h2>Create Account</h2>
        <p>Fill in your details to get started</p>
      </div>
      
      <div class="alert error" id="errorAlert">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage"></span>
      </div>
      
      <div class="alert success" id="successAlert">
        <i class="fas fa-check-circle"></i>
        <span>Registration successful! Redirecting...</span>
      </div>
      
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Choose a username" required minlength="3" oninput="checkUsername()">
            <i class="fas fa-user"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Create a password" required minlength="6" oninput="checkPasswordStrength()">
            <i class="fas fa-lock"></i>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            <i class="fas fa-lock"></i>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
          </div>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        
        <button type="submit" class="btn-signup" id="signupBtn">
          <span class="text">Create Account</span>
          <div class="loading"><div class="spinner"></div></div>
        </button>
      </form>
      
      <div class="divider"><span>ALREADY HAVE AN ACCOUNT?</span></div>
      
      <div class="signin-link">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const icon = event.target;
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      const bars = [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3'),
        document.getElementById('bar4')
      ];
      const strengthText = document.getElementById('strengthText');
      
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      bars.forEach((bar, i) => {
        bar.classList.remove('active', 'weak', 'medium', 'strong');
        if (i < strength) {
          bar.classList.add('active');
          if (strength <= 2) bar.classList.add('weak');
          else if (strength <= 3) bar.classList.add('medium');
          else bar.classList.add('strong');
        }
      });
      
      const labels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const classes = ['', 'weak', 'weak', 'medium', 'strong', 'strong'];
      strengthText.textContent = labels[strength];
      strengthText.className = 'strength-text ' + classes[strength];
    }

    function checkUsername() {
      const username = document.getElementById('username').value;
      const input = document.getElementById('username');
      if (username.length >= 3) {
        input.style.borderColor = '#22c55e';
      } else {
        input.style.borderColor = '';
      }
    }

    const API_BASE = 'http://localhost:8080/api';
    
    async function handleSignup(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const signupBtn = document.getElementById('signupBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');
      
      if (password !== confirmPassword) {
        errorAlert.style.display = 'flex';
        document.getElementById('errorMessage').textContent = 'Passwords do not match';
        return;
      }
      
      if (password.length < 6) {
        errorAlert.style.display = 'flex';
        document.getElementById('errorMessage').textContent = 'Password must be at least 6 characters';
        return;
      }
      
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      signupBtn.disabled = true;
      signupBtn.querySelector('.text').textContent = 'Creating account...';
      signupBtn.querySelector('.loading').style.display = 'block';
      
      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }
        
        localStorage.setItem('accessToken', data.data.accessToken);
        localStorage.setItem('refreshToken', data.data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.data.user));
        
        successAlert.style.display = 'flex';
        signupBtn.querySelector('.text').textContent = 'Success!';
        
        setTimeout(() => { window.location.href = 'chat.html'; }, 1000);
        
      } catch (err) {
        errorAlert.style.display = 'flex';
        document.getElementById('errorMessage').textContent = err.message;
        signupBtn.disabled = false;
        signupBtn.querySelector('.text').textContent = 'Create Account';
        signupBtn.querySelector('.loading').style.display = 'none';
      }
    }
    
    if (localStorage.getItem('accessToken')) {
      window.location.href = 'chat.html';
    }
  </script>
</body>
</html>
